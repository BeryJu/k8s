---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: beryjuio-meshmon
  namespace: istio-system
spec:
  issuerRef:
    name: letsencrypt-prod
    group: cert-manager.io
    kind: ClusterIssuer
  secretName: beryjuio-meshmon
  commonName: meshmon.${CLUSTER_NAME}.k8s.beryju.io
  dnsNames:
    - meshmon.${CLUSTER_NAME}.k8s.beryju.io
    - meshmon-grpc.${CLUSTER_NAME}.k8s.beryju.io
